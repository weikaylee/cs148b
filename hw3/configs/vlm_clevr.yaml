# §5 — VLM training on CLEVR.

decoder:
  model_name: HuggingFaceTB/SmolLM2-360M-Instruct
  torch_dtype: bfloat16
  attn_implementation: flash_attention_2

projector:
  expansion: 4

optim:
  lr: 1.0e-4
  weight_decay: 0.0
  betas: [0.9, 0.95]
  warmup_steps: 50
  scheduler: cosine

train:
  num_steps: 2000
  batch_size: 32
  gradient_accumulation_steps: 4
  num_workers: 4
  log_every: 25
  eval_every_steps: 200
  eval_max_examples: 500

generation:
  max_new_tokens: 32
  do_sample: false
  temperature: 1.0
  top_p: 1.0
